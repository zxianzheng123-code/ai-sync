<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex对等审查 — autoresearch 仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:24px}
h1{font-size:1.5rem;margin-bottom:4px}
.subtitle{color:#94a3b8;font-size:.85rem;margin-bottom:24px}
.status-bar{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:#1e293b;border-radius:12px;padding:16px 24px;min-width:140px}
.stat .label{font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
.stat .value{font-size:1.8rem;font-weight:700;margin-top:4px}
.stat .value.green{color:#4ade80}
.stat .value.blue{color:#60a5fa}
.stat .value.amber{color:#fbbf24}
.chart-container{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:24px}
table{width:100%;border-collapse:collapse;margin-bottom:24px}
th,td{text-align:left;padding:10px 14px;border-bottom:1px solid #334155}
th{color:#94a3b8;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em}
.badge{display:inline-block;padding:2px 10px;border-radius:9999px;font-size:.75rem;font-weight:600}
.badge.kept{background:#166534;color:#4ade80}
.badge.dropped{background:#7f1d1d;color:#f87171}
.badge.baseline{background:#1e3a5f;color:#60a5fa}
.eval-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.eval-card{background:#1e293b;border-radius:12px;padding:16px}
.eval-card .name{font-size:.85rem;color:#94a3b8;margin-bottom:8px}
.eval-card .rate{font-size:1.4rem;font-weight:700}
.running{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<h1>Codex对等审查 — autoresearch</h1>
<p class="subtitle" id="statusText">加载中...</p>

<div class="status-bar">
  <div class="stat"><div class="label">基线</div><div class="value blue" id="baselineScore">—</div></div>
  <div class="stat"><div class="label">当前最佳</div><div class="value green" id="bestScore">—</div></div>
  <div class="stat"><div class="label">当前实验</div><div class="value amber" id="currentExp">—</div></div>
  <div class="stat"><div class="label">保留/丢弃</div><div class="value" id="keptDropped">—</div></div>
</div>

<div class="chart-container">
  <canvas id="trendChart" height="80"></canvas>
</div>

<h2 style="font-size:1.1rem;margin-bottom:12px">各评估项通过率</h2>
<div class="eval-grid" id="evalGrid"></div>

<h2 style="font-size:1.1rem;margin-bottom:12px">实验记录</h2>
<table>
  <thead><tr><th>#</th><th>得分</th><th>通过率</th><th>状态</th><th>描述</th></tr></thead>
  <tbody id="expTable"></tbody>
</table>

<script>
let chart=null;
async function refresh(){
  try{
    const r=await fetch('results.json?t='+Date.now());
    const d=await r.json();
    document.getElementById('statusText').textContent=d.status==='complete'?'优化完成':'正在运行实验 #'+d.current_experiment+'...';
    document.getElementById('statusText').className=d.status==='complete'?'subtitle':'subtitle running';
    document.getElementById('baselineScore').textContent=d.baseline_score.toFixed(1)+'%';
    document.getElementById('bestScore').textContent=d.best_score.toFixed(1)+'%';
    document.getElementById('currentExp').textContent='#'+d.current_experiment;
    const kept=d.experiments.filter(e=>e.status==='kept').length;
    const dropped=d.experiments.filter(e=>e.status==='dropped').length;
    document.getElementById('keptDropped').innerHTML='<span style="color:#4ade80">'+kept+'</span> / <span style="color:#f87171">'+dropped+'</span>';

    // Chart
    const labels=d.experiments.map(e=>'#'+e.id);
    const data=d.experiments.map(e=>e.pass_rate);
    const colors=d.experiments.map(e=>e.status==='baseline'?'#60a5fa':e.status==='kept'?'#4ade80':'#f87171');
    if(chart){chart.data.labels=labels;chart.data.datasets[0].data=data;chart.data.datasets[0].pointBackgroundColor=colors;chart.data.datasets[0].borderColor='#94a3b8';chart.update();}
    else{chart=new Chart(document.getElementById('trendChart'),{type:'line',data:{labels,datasets:[{label:'通过率 %',data,borderColor:'#94a3b8',pointBackgroundColor:colors,pointRadius:6,tension:.3,fill:false}]},options:{scales:{y:{min:0,max:100,ticks:{color:'#94a3b8'}},x:{ticks:{color:'#94a3b8'}}},plugins:{legend:{display:false}}}});}

    // Eval grid
    const grid=document.getElementById('evalGrid');
    grid.innerHTML='';
    d.eval_breakdown.forEach(ev=>{
      const latest=ev.history.length?ev.history[ev.history.length-1]:null;
      const rate=latest!==null?latest.toFixed(0)+'%':'—';
      grid.innerHTML+='<div class="eval-card"><div class="name">EVAL '+ev.id+': '+ev.name+'</div><div class="rate" style="color:'+(latest>=80?'#4ade80':latest>=50?'#fbbf24':'#f87171')+'">'+rate+'</div></div>';
    });

    // Table
    const tb=document.getElementById('expTable');
    tb.innerHTML='';
    d.experiments.forEach(e=>{
      const cls=e.status==='baseline'?'baseline':e.status==='kept'?'kept':'dropped';
      tb.innerHTML+='<tr><td>'+e.id+'</td><td>'+e.score+'/'+e.max_score+'</td><td>'+e.pass_rate.toFixed(1)+'%</td><td><span class="badge '+cls+'">'+e.status+'</span></td><td>'+e.description+'</td></tr>';
    });
  }catch(e){console.error(e)}
}
refresh();
setInterval(refresh,10000);
</script>
</body>
</html>
